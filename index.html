<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Regresiva - Concierto de Ado en Chile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preload" href="script.js" as="script">
    <meta name="description" content="Cuenta regresiva para el concierto de Ado en Chile">
</head>
<body onclick="PlayAudio()">
  <audio id="audio1" src="Nukegara44.mp3" autoplay loop controls></audio>
    <div class="container">
        <h1>Cuenta Regresiva Para el Concierto de Ado en Chile</h1>
        
        <div id="countdown">
            <div class="time-block">
                <span id="days">00</span>
                <p>Días</p>
            </div>
            <div class="time-block">
                <span id="hours">00</span>
                <p>Horas</p>
            </div>
            <div class="time-block">
                <span id="minutes">00</span>
                <p>Minutos</p>
            </div>
            <div class="time-block">
                <span id="seconds">00</span>
                <p>Segundos</p>
            </div>
        </div>

        <div class="ado">
            <img src="https://i.pinimg.com/736x/f1/dd/00/f1dd005ad9380273f3dbb7c844b19512.jpg" alt="Ado Imagen 1" loading="lazy">
            <img src="https://i.pinimg.com/736x/76/9c/77/769c775161333364cdb529e7ae04813f.jpg" alt="Ado Imagen 2" loading="lazy">
            <img src="https://i.pinimg.com/736x/dc/94/b1/dc94b1d6c0335188299cbb7a7a6b9814.jpg" alt="Ado Imagen 3" loading="lazy">
            <img src="https://pbs.twimg.com/media/GdPWE1LakAAOp5l?format=jpg&name=large" alt="Ado Imagen 4" loading="lazy">
            <img src="https://pbs.twimg.com/media/GdOFZ69aIAAhLGM?format=jpg&name=large" alt="Ado Imagen 5" loading="lazy">
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
